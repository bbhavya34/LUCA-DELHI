{% extends 'base/admin_base.html' %}{% load static %}{% block page_title %}Past Event Gallery{% endblock %}
{% block admin_content %}<div class="gallery-toolbar"><form method="get"><select name="event" onchange="this.form.submit()"><option value="">All past events</option>{% for event in events %}<option value="{{ event.pk }}" {% if request.GET.event == event.pk|stringformat:'s' %}selected{% endif %}>{{ event.name }}</option>{% endfor %}</select></form><a class="btn btn-primary" href="{% url 'events:gallery_upload' %}">Add Media</a></div>{% include 'components/gallery_grid.html' with can_manage=True %}{% endblock %}
