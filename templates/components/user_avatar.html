<span class="profile-avatar profile-avatar--{{ size|default:'md' }}" aria-label="{{ user.get_full_name|default:user.username }} profile photo">
  {% if user.profile_image %}
    <img src="{{ user.profile_image.url }}" alt="{{ user.get_full_name|default:user.username }}">
  {% else %}
    <span aria-hidden="true">{{ user.first_name|default:user.username|first|upper }}</span>
  {% endif %}
</span>
