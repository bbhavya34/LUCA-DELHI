databases:
  - name: luca-db
    plan: free
    databaseName: luca
    user: luca

services:
  - type: web
    name: luca
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn luca.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: luca-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: CLOUDINARY_URL
        sync: false
      - key: DB_CONN_MAX_AGE
        value: "600"
      - key: WEB_CONCURRENCY
        value: "2"
